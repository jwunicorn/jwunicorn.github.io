<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jamrianna White</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');

    :root {
      --card: #ffffff;
      --border: #e5e5e5;
      --accent: #bfbfbf;
      --accent-dark: #9a9a9a;
      --text-main: #2f2f2f;
      --text-muted: #6f6f6f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ANIMATED PASTEL CLOUD BACKGROUND */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fde2f3, #e3f0ff, #fdf6ff);
      background-size: 400% 400%;
      animation: cloudFloat 12s ease infinite;
      color: var(--text-main);
      line-height: 1.5;
    }

    @keyframes cloudFloat {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* HEADER — THINNER */
    header {
      padding: 0.8rem 5vw;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: #ffffffcc;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-family: 'Allura', cursive;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 0.2rem;
    }

    header .underline {
      width: 150px;
      height: 1px;
      background: var(--text-main);
      margin: 0.2rem auto 0;
      opacity: 0.35;
    }

    /* SUBPANEL */
    .subpanel {
      max-width: 800px;
      margin: 1.4rem auto 0.4rem;
      padding: 0.8rem 2rem;
      text-align: center;
      font-size: 1.15rem;
      opacity: 0.9;
    }

    /* ABOUT SECTION */
    .about {
      max-width: 700px;
      margin: 0.6rem auto 0;
      padding: 0 2rem;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .about-divider {
      width: 100%;
      max-width: 700px;
      height: 1px;
      background: var(--border);
      margin: 1rem auto 1.8rem;
      opacity: 0.6;
    }

    /* PANELS — 2×3 GRID */
    .info-panels {
      max-width: 900px;
      margin: 2rem auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.4rem;
    }

    .panel {
      background: white;
      padding: 2rem;
      border-radius: 0.9rem;
      text-align: center;
      font-size: 1.2rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-3px);
      background: #fafafa;
    }

    /* MODALS */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 1rem;
      border-radius: 0.8rem;
      max-width: 500px;
      width: 100%;
    }

    .modal-content h3 {
      margin-bottom: 0.4rem;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    .modal-content p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
      white-space: pre-line;
      word-wrap: break-word;
    }

    button {
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .hint {
      position: fixed;
      bottom: 0.7rem;
      right: 0.9rem;
      font-size: 0.7rem;
      color: #b0b0b0;
      user-select: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Jamrianna White</h1>
    <div class="underline"></div>
  </header>

  <section class="subpanel">
    <p>Iakwe! | Hello!</p>
  </section>

  <section class="about">
    <p>Feel free to click any of the boxes to know more:)</p>
    <div class="about-divider"></div>
  </section>

  <!-- 2×3 PANELS — YOUR EXACT ORDER -->
  <section class="info-panels">

    <div class="panel" onclick="openTextModal('Meeee', 'Iakwe! My name is Mianna and I am from the Marshall Islands. I am a sophomore in Mechanical Engineering.')">
      Meeee
    </div>

    <div class="panel" onclick="openTextModal('ICS111', 'When I started ICS, I knew nothing about computers. Over the semester, I’ve learned so much, and Chapter 3 became my favorite topic. Blocks, loops, and branches were confusing at first, but with practice and LOTS of reading, they eventually clicked. Now I actually enjoy how convenient ...and oddly satisfying.. they are to use in Java. This class has made me excited to keep learning.')">
      ICS111
    </div>

    <div class="panel" onclick="openTextModal('Marshall Islands', 'The Marshall Islands sits in the North Pacific, roughly halfway between Hawai‘i and Australia. It includes 29 atolls and 5 islands, with 24 that are inhabited. A fun fact: it has one of the world’s largest shark sanctuary. I could go on and on about my home, but I’ll stop here. If you’re curious to learn more, feel free to ask.')">
      Marshall Islands
    </div>

    <div class="panel" onclick="openTextModal('Interests', 'I spend my free time at home with a good book, a documentary, or whatever movie, show, or anime I’m into at the moment. But when my social battery decides to cooperate, I love going out to swim, explore new places, or try something new. I love seafood, and coffee might as well be my second source of oxygen.')">
      Interests
    </div>

    <div class="panel" onclick="openTextModal('Accomplishments', '• Students on Ice Participant — 2019\n• Atoll Youth Climate Leader — ADB’s Youth for Asia project: Catalyzing Youth-led Climate Action in Atoll Nations — 2022\n• Democracy and Media Workshop — Pacific Media Institute — 2023\n• Radiation Exposure Awareness Crusaders for Humanity — College of the Marshall Islands Clubs Branch, Treasurer — 2024–2025')">
      Accomplishments
    </div>

    <div class="panel" onclick="openTextModal('Goals', 'I have a few short‑term and long‑term goals. I want to learn how to ride a motorcycle and pick up a new language. I also hope to graduate with my degree in mechanical engineering, pursue my master’s, and hopefully earn a doctorate. My ultimate goal is to return home to the Marshall Islands and give back to the community that raised me. And hopefully, I’ll also have the chance to travel the world and experience new places.')">
      Goals
    </div>

  </section>

  <!-- TEXT MODAL -->
  <div id="textModal" class="modal" onclick="closeTextModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="textModalTitle"></h3>
      <p id="textModalBody"></p>
      <button onclick="closeTextModal()">Close</button>
    </div>
  </div>

  <div class="hint">Shift + O</div>

  <script>
    function openTextModal(title, body) {
      document.getElementById("textModalTitle").textContent = title;
      document.getElementById("textModalBody").textContent = body;
      document.getElementById("textModal").style.display = "flex";
    }

    function closeTextModal() {
      document.getElementById("textModal").style.display = "none";
    }
  </script>

</body>
</html>
