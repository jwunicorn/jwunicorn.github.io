<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jamrianna White</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');

    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --border: #e5e5e5;
      --accent: #bfbfbf;
      --accent-dark: #9a9a9a;
      --text-main: #2f2f2f;
      --text-muted: #6f6f6f;
      --danger: #b85c5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      padding: 1.5rem 5vw;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: #ffffffcc;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-family: 'Allura', cursive;
      font-size: 3.4rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 0.2rem;
      animation: slideIn 0.8s ease-out forwards;
    }

    header .underline {
      width: 150px;
      height: 1px;
      background: var(--text-main);
      margin: 0.2rem auto 0;
      opacity: 0.35;
      animation: slideIn 1s ease-out forwards;
    }

    /* SUBPANEL */
    .subpanel {
      max-width: 800px;
      margin: 1.8rem auto 0.5rem;
      padding: 0.8rem 2rem;
      text-align: center;
      font-size: 1.15rem;
      opacity: 0.9;
    }

    /* ABOUT SECTION */
    .about {
      max-width: 700px;
      margin: 1.4rem auto 0;
      padding: 0 2rem;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .about-divider {
      width: 100%;
      max-width: 700px;
      height: 1px;
      background: var(--border);
      margin: 1rem auto 1.8rem;
      opacity: 0.6;
    }

    /* PANELS */
    .info-panels {
      max-width: 900px;
      margin: 2rem auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.4rem;
    }

    .panel {
      background: white;
      padding: 2rem;
      border-radius: 0.9rem;
      text-align: center;
      font-size: 1.2rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-3px);
      background: #fafafa;
    }

    /* MODALS */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 1rem;
      border-radius: 0.8rem;
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    .modal-content h3 {
      margin-bottom: 0.4rem;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    .modal-content p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    button {
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .hint {
      position: fixed;
      bottom: 0.7rem;
      right: 0.9rem;
      font-size: 0.7rem;
      color: #b0b0b0;
      user-select: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Jamrianna White</h1>
    <div class="underline"></div>
  </header>

  <section class="subpanel">
    <p>Iakwe! | Hello!</p>
  </section>

  <section class="about">
    <p>This is where you can write a short introduction or message.</p>
    <div class="about-divider"></div>
  </section>

  <!-- FOUR PANELS -->
  <section class="info-panels">
    <div class="panel" onclick="openTextModal('About Me', 'Write about yourself here...')">
      About Me
    </div>

    <div class="panel" onclick="openTextModal('Interests', 'Write your interests here...')">
      Interests
    </div>

    <div class="panel" onclick="openTextModal('ICS111', 'Write your ICS111 info here...')">
      ICS111
    </div>

    <div class="panel" onclick="openTextModal('Goals', 'Write your goals here...')">
      Goals
    </div>
  </section>

  <!-- TEXT MODAL -->
  <div id="textModal" class="modal" onclick="closeTextModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="textModalTitle"></h3>
      <p id="textModalBody"></p>
      <button onclick="closeTextModal()">Close</button>
    </div>
  </div>

  <div class="hint">Shift + O</div>

  <script>
    function openTextModal(title, body) {
      document.getElementById("textModalTitle").textContent = title;
      document.getElementById("textModalBody").textContent = body;
      document.getElementById("textModal").style.display = "flex";
    }

    function closeTextModal() {
      document.getElementById("textModal").style.display = "none";
    }
  </script>

</body>
</html>
